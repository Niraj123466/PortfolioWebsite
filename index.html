      <style>
        .preloader {
          position: fixed;
          inset: 0;
          background-color: hsl(220 20% 10%); /* Matches dark background */
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: 'Inter', sans-serif;
        }
        .spinner {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(45, 212, 191, 0.2); /* Teal border */
          border-top-color: hsl(173 80% 40%); /* Teal primary */
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        .loading-text {
          margin-top: 16px;
          color: hsl(173 80% 40%);
          font-size: 14px;
          font-weight: 500;
          letter-spacing: 2px;
          text-transform: uppercase;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="preloader">
        <div class="spinner"></div>
        <div class="loading-text">Loading</div>
      </div>
